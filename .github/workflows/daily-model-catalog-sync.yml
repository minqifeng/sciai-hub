name: Daily Model Catalog Sync

on:
  schedule:
    # Run daily at 02:00 UTC except Monday, when the weekly snapshot owns the slot.
    - cron: '0 2 * * 0,2-6'
  workflow_dispatch:

concurrency:
  group: model-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch OpenRouter catalog
        run: node .github/scripts/sync-models.js

      - name: Validate manifests
        run: node .github/scripts/validate-manifests.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DAY=$(date -u '+%Y-%m-%d')
            git commit -m "chore: auto-sync OpenRouter model catalog ($DAY)"
            git push origin main
            echo "Pushed updated catalog."
          fi
